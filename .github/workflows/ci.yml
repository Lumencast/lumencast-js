name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on PRs but never on main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"

jobs:
  lockfile:
    name: lockfile-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - name: Verify pnpm-lock.yaml is up to date
        run: pnpm install --frozen-lockfile

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: lockfile
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    needs: lockfile
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    needs: lockfile
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      # Inter-package imports (server → protocol, dev-server → protocol)
      # resolve via the dist/ entry declared in each package.json. We
      # build before testing so those entries exist ; the alternative
      # (vitest path aliases pointing at source) is a future cleanup
      # if this becomes a build-time bottleneck.
      - run: pnpm build
      - run: pnpm test

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Upload runtime dist
        uses: actions/upload-artifact@v4
        with:
          name: runtime-dist
          path: packages/runtime/dist/

  bundle-budget:
    name: check:bundle
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm check:bundle

  e2e:
    name: e2e (Playwright)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      # Playwright is in @lumencast/runtime's devDependencies, not at
      # the workspace root. Filter the exec to that package.
      - run: pnpm --filter @lumencast/runtime exec playwright install --with-deps chromium
      - run: pnpm build
      - run: pnpm test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/runtime/playwright-report/
          if-no-files-found: ignore

  conformance:
    name: conformance
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          path: lumencast-js
      - uses: actions/checkout@v4
        with:
          repository: Lumencast/lumencast-protocol
          path: lumencast-protocol
          ref: main
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: lumencast-js/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: lumencast-js/pnpm-lock.yaml
      - working-directory: lumencast-js
        run: pnpm install --frozen-lockfile
      - name: Byte-level fixtures round-trip
        working-directory: lumencast-js
        run: pnpm conformance
        env:
          LUMENCAST_PROTOCOL_REPO: ${{ github.workspace }}/lumencast-protocol

  interop-self-test:
    name: interop self-test (JS server × JS harness)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          path: lumencast-js
      - uses: actions/checkout@v4
        with:
          repository: Lumencast/lumencast-protocol
          path: lumencast-protocol
          ref: main
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: lumencast-js/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: lumencast-js/pnpm-lock.yaml
      - working-directory: lumencast-js
        run: pnpm install --frozen-lockfile
      - working-directory: lumencast-js
        run: pnpm build
      - name: Self-test serve-scenario × conformance
        working-directory: lumencast-js
        run: pnpm interop:self-test
        env:
          LUMENCAST_PROTOCOL_REPO: ${{ github.workspace }}/lumencast-protocol

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    needs: lockfile
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Trufflehog scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  codeowners:
    name: codeowners-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify CODEOWNERS exists and parses
        run: |
          test -f .github/CODEOWNERS || (echo "CODEOWNERS missing"; exit 1)
          # Ensure no obviously malformed lines (skip blank + comments).
          awk 'NF && $1 !~ /^#/' .github/CODEOWNERS > /dev/null
